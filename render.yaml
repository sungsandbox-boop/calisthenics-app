databases:
  - name: kaizen-cali-db
    plan: free
    databaseName: kaizen_cali
    user: kaizen_user

services:
  - type: web
    name: kaizen-cali
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: kaizen-cali-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
