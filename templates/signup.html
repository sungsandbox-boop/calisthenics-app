{% extends "auth_base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<h2>Create Account</h2>
<form method="POST" action="/signup">
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required autofocus placeholder="Your name">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="At least 6 characters" minlength="6">
    </div>
    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Confirm your password" minlength="6">
    </div>
    <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign Up</button>
</form>
<p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
{% endblock %}
