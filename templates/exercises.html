{% extends "base.html" %}
{% block title %}Exercise Library{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Exercise Library</h1>
    <span class="text-muted text-sm" id="exercise-count"></span>
</div>

<div class="filter-bar">
    <input type="text" id="search-input" placeholder="Search exercises...">
    <select id="filter-category">
        <option value="">All Categories</option>
        <option value="push">Push</option>
        <option value="pull">Pull</option>
        <option value="legs">Legs</option>
        <option value="core">Core</option>
        <option value="skill">Skills</option>
        <option value="mobility">Mobility</option>
    </select>
    <select id="filter-difficulty">
        <option value="">All Levels</option>
        <option value="1-3">Beginner (1-3)</option>
        <option value="4-6">Intermediate (4-6)</option>
        <option value="7-10">Advanced (7-10)</option>
    </select>
</div>

<div class="card-grid" id="exercises-grid"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/exercises.js"></script>
{% endblock %}
