{% extends "auth_base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<h2>Log In</h2>
<form method="POST" action="/login">
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Your password">
    </div>
    <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Log In</button>
</form>
<p class="auth-footer">Don't have an account? <a href="/signup">Sign up</a></p>
{% endblock %}
