{% extends "base.html" %}
{% block title %}Workout Generator{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Workout Generator</h1>
</div>

<div class="card">
    <h2>Configure Your Workout</h2>
    <div class="form-row">
        <div class="form-group">
            <label>Level</label>
            <select id="gen-level">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>
        </div>
        <div class="form-group">
            <label>Focus</label>
            <select id="gen-focus">
                <option value="full body">Full Body</option>
                <option value="push">Push</option>
                <option value="pull">Pull</option>
                <option value="upper body">Upper Body</option>
                <option value="push/pull">Push/Pull</option>
                <option value="legs">Legs</option>
                <option value="core">Core</option>
                <option value="skills">Skills</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Duration (minutes)</label>
            <select id="gen-duration">
                <option value="30">30 min</option>
                <option value="45" selected>45 min</option>
                <option value="60">60 min</option>
                <option value="75">75 min</option>
                <option value="90">90 min</option>
            </select>
        </div>
        <div class="form-group">
            <label>Goal</label>
            <select id="gen-goal">
                <option value="strength">Strength</option>
                <option value="hypertrophy">Hypertrophy</option>
                <option value="endurance">Endurance</option>
                <option value="skill">Skill Work</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>Equipment</label>
        <select id="gen-equipment">
            <option value="bar">Pull-up bar available</option>
            <option value="none">No equipment</option>
        </select>
    </div>
    <button class="btn btn-primary btn-lg" onclick="generateWorkout()">Generate Workout</button>
</div>

<!-- Generated Result -->
<div id="generated-workout" class="hidden">
    <div class="card mt-16">
        <div class="card-header">
            <h2 id="gen-workout-name"></h2>
            <span class="text-muted text-sm" id="gen-workout-meta"></span>
        </div>
        <div id="gen-workout-exercises"></div>
        <div class="btn-group mt-16">
            <button class="btn btn-success btn-lg" onclick="startWorkout()">Start This Workout</button>
            <button class="btn" onclick="saveAsTemplate()">Save as Template</button>
            <button class="btn" onclick="generateWorkout()">Regenerate</button>
        </div>
    </div>
</div>

<!-- Saved Templates -->
<div class="mt-24">
    <h2>Saved Templates</h2>
    <div id="templates-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/generator.js"></script>
{% endblock %}
